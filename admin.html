<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Дашборд заявок</title>
    <link rel="stylesheet" href="assets/landing.css?v=25">
    <style>
      :root {
        --admin-bg: #f4f7f6;
        --admin-panel: #ffffff;
        --admin-ink: #1f2428;
        --admin-muted: #65727f;
        --admin-line: #dce4e1;
        --admin-green: #1d5b49;
        --admin-gold: #c99a2e;
        --admin-accent: #c91663;
      }

      body {
        background: var(--admin-bg);
      }

      .admin-page {
        max-width: 1280px;
        margin: 0 auto;
        padding: 28px 20px 56px;
        color: var(--admin-ink);
      }

      .admin-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
      }

      .admin-kicker {
        margin: 0 0 6px;
        color: var(--admin-green);
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .admin-page h1 {
        margin: 0;
        font-size: clamp(30px, 5vw, 52px);
        letter-spacing: 0;
      }

      .admin-shell {
        display: grid;
        gap: 18px;
      }

      .admin-toolbar,
      .admin-section {
        background: var(--admin-panel);
        border: 1px solid var(--admin-line);
        border-radius: 8px;
        box-shadow: 0 14px 40px rgba(20, 35, 30, .08);
      }

      .admin-toolbar {
        display: grid;
        grid-template-columns: minmax(190px, 1fr) minmax(150px, .55fr) minmax(150px, .55fr) auto auto;
        gap: 12px;
        align-items: end;
        padding: 16px;
      }

      .admin-field {
        display: grid;
        gap: 7px;
      }

      .admin-field span {
        color: var(--admin-muted);
        font-size: 13px;
        font-weight: 700;
      }

      .admin-field input {
        min-height: 46px;
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--admin-line);
        border-radius: 6px;
        background: #fff;
        color: var(--admin-ink);
        font: inherit;
      }

      .admin-periods {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 0 16px 16px;
      }

      .period-button {
        min-height: 36px;
        padding: 7px 12px;
        border: 1px solid var(--admin-line);
        border-radius: 6px;
        background: #fff;
        color: var(--admin-muted);
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .period-button.is-active {
        border-color: rgba(29, 91, 73, .35);
        background: rgba(29, 91, 73, .08);
        color: var(--admin-green);
      }

      .admin-status {
        min-height: 24px;
        margin: 0;
        color: var(--admin-muted);
      }

      .admin-status.is-error {
        color: var(--admin-accent);
      }

      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .metric-card {
        min-height: 128px;
        padding: 18px;
        background: var(--admin-panel);
        border: 1px solid var(--admin-line);
        border-radius: 8px;
        box-shadow: 0 14px 40px rgba(20, 35, 30, .08);
      }

      .metric-card span {
        display: block;
        color: var(--admin-muted);
        font-size: 13px;
        font-weight: 800;
      }

      .metric-card strong {
        display: block;
        margin-top: 14px;
        font-size: 36px;
        line-height: 1;
      }

      .metric-card em {
        display: block;
        margin-top: 10px;
        color: var(--admin-muted);
        font-style: normal;
        font-size: 13px;
      }

      .analytics-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(320px, .85fr);
        gap: 18px;
      }

      .admin-section {
        padding: 18px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .section-head h2 {
        margin: 0;
        font-size: 22px;
      }

      .section-head span {
        color: var(--admin-muted);
        font-size: 13px;
        font-weight: 700;
      }

      .day-chart {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(34px, 1fr));
        align-items: end;
        gap: 8px;
        min-height: 220px;
        padding-top: 12px;
      }

      .day-bar {
        display: grid;
        align-items: end;
        gap: 8px;
        min-width: 0;
      }

      .day-bar i {
        display: block;
        min-height: 4px;
        border-radius: 6px 6px 2px 2px;
        background: linear-gradient(180deg, var(--admin-gold), var(--admin-green));
      }

      .day-bar span {
        color: var(--admin-muted);
        font-size: 11px;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .product-list {
        display: grid;
        gap: 12px;
      }

      .product-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
      }

      .product-row strong {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .product-row span {
        color: var(--admin-muted);
        font-weight: 800;
      }

      .product-line {
        grid-column: 1 / -1;
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: #edf2f0;
      }

      .product-line i {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--admin-green);
      }

      .admin-table-wrap {
        overflow-x: auto;
        border: 1px solid var(--admin-line);
        border-radius: 8px;
      }

      .admin-table {
        width: 100%;
        min-width: 940px;
        border-collapse: collapse;
      }

      .admin-table th,
      .admin-table td {
        padding: 13px 14px;
        border-bottom: 1px solid var(--admin-line);
        text-align: left;
        vertical-align: top;
      }

      .admin-table th {
        color: var(--admin-muted);
        background: #f8faf9;
        font-size: 13px;
      }

      .admin-table td {
        color: #33404a;
      }

      .empty-state {
        padding: 30px;
        color: var(--admin-muted);
        text-align: center;
      }

      @media (max-width: 980px) {
        .admin-toolbar,
        .analytics-grid,
        .metrics-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 680px) {
        .admin-topbar,
        .admin-toolbar,
        .analytics-grid,
        .metrics-grid {
          grid-template-columns: 1fr;
        }

        .admin-topbar {
          align-items: flex-start;
        }

        .admin-toolbar .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="admin-page">
      <div class="admin-topbar">
        <div>
          <p class="admin-kicker">Профиль</p>
          <h1>Дашборд заявок</h1>
        </div>
        <a class="button button--secondary" href="index.html">На сайт</a>
      </div>

      <section class="admin-shell">
        <div class="admin-toolbar">
          <label class="admin-field">
            <span>Админ-токен</span>
            <input id="adminToken" type="password" placeholder="Введите токен">
          </label>
          <label class="admin-field">
            <span>С даты</span>
            <input id="dateFrom" type="date">
          </label>
          <label class="admin-field">
            <span>По дату</span>
            <input id="dateTo" type="date">
          </label>
          <button class="button button--primary" type="button" id="loadStats">Обновить</button>
          <button class="button button--secondary" type="button" id="downloadCsv">Скачать CSV</button>
        </div>

        <div class="admin-periods" aria-label="Быстрый выбор периода">
          <button class="period-button" type="button" data-period="today">Сегодня</button>
          <button class="period-button" type="button" data-period="7">7 дней</button>
          <button class="period-button" type="button" data-period="30">30 дней</button>
          <button class="period-button" type="button" data-period="month">Этот месяц</button>
          <button class="period-button" type="button" data-period="all">Все время</button>
        </div>

        <p class="admin-status" id="adminStatus" role="status" aria-live="polite"></p>

        <section class="metrics-grid" id="statsCards"></section>

        <section class="analytics-grid">
          <article class="admin-section">
            <div class="section-head">
              <h2>Динамика</h2>
              <span id="chartPeriod"></span>
            </div>
            <div class="day-chart" id="dayChart"></div>
          </article>

          <article class="admin-section">
            <div class="section-head">
              <h2>Товары</h2>
              <span id="productCount"></span>
            </div>
            <div class="product-list" id="productList"></div>
          </article>
        </section>

        <section class="admin-section">
          <div class="section-head">
            <h2>Заявки</h2>
            <span id="leadsCount"></span>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Дата</th>
                  <th>Имя</th>
                  <th>Телефон</th>
                  <th>Telegram</th>
                  <th>Товар</th>
                  <th>Комментарий</th>
                </tr>
              </thead>
              <tbody id="leadsBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script>
      const tokenInput = document.querySelector('#adminToken');
      const dateFromInput = document.querySelector('#dateFrom');
      const dateToInput = document.querySelector('#dateTo');
      const status = document.querySelector('#adminStatus');
      const statsCards = document.querySelector('#statsCards');
      const dayChart = document.querySelector('#dayChart');
      const productList = document.querySelector('#productList');
      const productCount = document.querySelector('#productCount');
      const chartPeriod = document.querySelector('#chartPeriod');
      const leadsBody = document.querySelector('#leadsBody');
      const leadsCount = document.querySelector('#leadsCount');
      const savedToken = localStorage.getItem('leadsAdminToken');
      if (savedToken) tokenInput.value = savedToken;

      function isoDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }

      function setPeriod(period) {
        const now = new Date();
        const end = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        let start = null;

        if (period === 'today') {
          start = end;
        } else if (period === '7') {
          start = new Date(end);
          start.setDate(start.getDate() - 6);
        } else if (period === '30') {
          start = new Date(end);
          start.setDate(start.getDate() - 29);
        } else if (period === 'month') {
          start = new Date(end.getFullYear(), end.getMonth(), 1);
        }

        dateFromInput.value = start ? isoDate(start) : '';
        dateToInput.value = period === 'all' ? '' : isoDate(end);
        document.querySelectorAll('.period-button').forEach((button) => {
          button.classList.toggle('is-active', button.dataset.period === period);
        });
      }

      function getToken() {
        const token = tokenInput.value.trim();
        if (token) localStorage.setItem('leadsAdminToken', token);
        return token;
      }

      function authUrl(path, extra = {}) {
        const params = new URLSearchParams();
        params.set('token', getToken());

        if (dateFromInput.value) params.set('date_from', dateFromInput.value);
        if (dateToInput.value) params.set('date_to', dateToInput.value);

        Object.entries(extra).forEach(([key, value]) => {
          if (value !== undefined && value !== null && value !== '') params.set(key, value);
        });

        return `${path}?${params.toString()}`;
      }

      function formatDate(value) {
        if (!value) return '';
        const date = new Date(`${String(value).slice(0, 10)}T00:00:00`);
        return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: '2-digit' });
      }

      function formatDateTime(value) {
        if (!value) return '';
        return value.replace('T', ' ').slice(0, 16);
      }

      function setStatus(text, isError = false) {
        status.textContent = text;
        status.classList.toggle('is-error', isError);
      }

      function metric(label, value, note) {
        const card = document.createElement('article');
        card.className = 'metric-card';
        card.innerHTML = `<span>${label}</span><strong>${value}</strong><em>${note || ''}</em>`;
        return card;
      }

      function renderMetrics(stats) {
        const periodLabel = stats.dateFrom || stats.dateTo
          ? `${stats.dateFrom || '...'} - ${stats.dateTo || '...'}`
          : 'все время';

        statsCards.innerHTML = '';
        statsCards.append(
          metric('Заявок за период', stats.periodTotal, periodLabel),
          metric('Уникальных телефонов', stats.uniquePhones, 'по выбранному периоду'),
          metric('Сегодня', stats.today, 'все заявки за текущий день'),
          metric('Всего заявок', stats.total, 'за все время')
        );
      }

      function renderDayChart(items) {
        dayChart.innerHTML = '';
        chartPeriod.textContent = items.length ? `${items.length} дней` : '';

        if (!items.length) {
          dayChart.innerHTML = '<div class="empty-state">За выбранный период заявок нет</div>';
          return;
        }

        const max = Math.max(...items.map((item) => item.count), 1);
        items.forEach((item) => {
          const bar = document.createElement('div');
          bar.className = 'day-bar';
          const height = Math.max(6, Math.round((item.count / max) * 180));
          bar.innerHTML = `<i style="height:${height}px" title="${item.count}"></i><span>${formatDate(item.day)}</span>`;
          dayChart.append(bar);
        });
      }

      function renderProducts(items) {
        productList.innerHTML = '';
        productCount.textContent = items.length ? `${items.length} позиций` : '';

        if (!items.length) {
          productList.innerHTML = '<div class="empty-state">Нет данных по товарам</div>';
          return;
        }

        const max = Math.max(...items.map((item) => item.count), 1);
        items.forEach((item) => {
          const row = document.createElement('div');
          row.className = 'product-row';
          const width = Math.max(4, Math.round((item.count / max) * 100));
          row.innerHTML = `
            <strong>${item.product || 'Не указан'}</strong>
            <span>${item.count}</span>
            <div class="product-line"><i style="width:${width}%"></i></div>
          `;
          productList.append(row);
        });
      }

      function cell(value) {
        const td = document.createElement('td');
        td.textContent = value || '';
        return td;
      }

      function renderLeads(leads) {
        leadsBody.innerHTML = '';
        leadsCount.textContent = leads.length ? `${leads.length} строк` : 'нет заявок';

        if (!leads.length) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = 6;
          td.className = 'empty-state';
          td.textContent = 'За выбранный период заявок нет';
          tr.append(td);
          leadsBody.append(tr);
          return;
        }

        leads.forEach((lead) => {
          const tr = document.createElement('tr');
          tr.append(
            cell(formatDateTime(lead.created_at)),
            cell(lead.name),
            cell(lead.phone),
            cell(lead.telegram),
            cell(lead.product),
            cell(lead.message)
          );
          leadsBody.append(tr);
        });
      }

      async function loadDashboard() {
        setStatus('Загружаем данные...');

        try {
          const [statsResponse, leadsResponse] = await Promise.all([
            fetch(authUrl('/api/stats')),
            fetch(authUrl('/api/leads', { limit: 500 })),
          ]);

          const statsPayload = await statsResponse.json();
          const leadsPayload = await leadsResponse.json();

          if (!statsResponse.ok || !statsPayload.ok) throw new Error(statsPayload.error || 'Ошибка статистики');
          if (!leadsResponse.ok || !leadsPayload.ok) throw new Error(leadsPayload.error || 'Ошибка заявок');

          renderMetrics(statsPayload.stats);
          renderDayChart(statsPayload.stats.byDay);
          renderProducts(statsPayload.stats.byProduct);
          renderLeads(leadsPayload.leads);
          setStatus('Данные обновлены.');
        } catch (error) {
          setStatus(error.message || 'Не удалось загрузить данные.', true);
        }
      }

      document.querySelectorAll('.period-button').forEach((button) => {
        button.addEventListener('click', () => {
          setPeriod(button.dataset.period);
          loadDashboard();
        });
      });

      document.querySelector('#loadStats').addEventListener('click', loadDashboard);
      document.querySelector('#downloadCsv').addEventListener('click', () => {
        window.location.href = authUrl('/api/export', { limit: 1000 });
      });

      setPeriod('30');
      if (savedToken) loadDashboard();
    </script>
  </body>
</html>
